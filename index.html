<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Curso Completo Python - Formação Profissional</title>
    <style>
        :root { --primary: #3776ab; --bg: #f9f9f9; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 20px; }
        h1 { color: var(--primary); text-align: center; }
        .module { background: white; border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .lesson { border-bottom: 1px solid #eee; padding: 15px 0; }
        details { cursor: pointer; }
        summary { font-weight: bold; padding: 10px; background: #eee; border-radius: 4px; display: block; }
        pre { background: #282c34; color: #98c379; padding: 15px; border-radius: 5px; overflow-x: auto; font-size: 0.9em; }
        .checkbox-container { display: flex; align-items: center; margin-bottom: 10px; }
        input { margin-right: 10px; transform: scale(1.3); }
    </style>
</head>
<body>

    <h1>🚀 Formação Python: 50 Aulas Práticas</h1>
    <div id="trilha"></div>

    <script>
        const conteudos = [
            { mod: "Módulo 1: Fundamentos", aulas: [
                { t: "Setup: Python e VS Code", d: "Instalação do interpretador e editor. A base de tudo.", c: "print('Python configurado!')" },
                { t: "Hello World", d: "Primeiro contato com a função print().", c: "print('Olá, Mundo!')" },
                { t: "Variáveis", d: "Armazenando dados na memória.", c: "nome = 'Gemini'\nidade = 25" },
                { t: "Tipos de Dados", d: "Entendendo int, float, str e bool.", c: "tipo = type(10) # <class 'int'>" },
                { t: "Entrada de Dados", d: "Recebendo valores via teclado.", c: "n = input('Digite algo: ')" },
                { t: "Operadores Matemáticos", d: "+, -, *, /, //, %.", c: "total = 10 * 5" },
                { t: "Strings Avançadas", d: "Fatiamento e métodos.", c: "texto = 'Python'\nprint(texto[0:2])" },
                { t: "F-Strings", d: "Interpolação moderna.", c: "print(f'Olá {nome}')" },
                { t: "Conversão de Tipos", d: "Casting int() e str().", c: "n = int('10')" },
                { t: "Desafio 1: Calculadora", d: "Somar dois números.", c: "print(n1 + n2)" }
            ]},
            { mod: "Módulo 2: Controle de Fluxo", aulas: [
                { t: "IF, ELIF, ELSE", d: "Tomada de decisão.", c: "if x > 10: print('Maior')" },
                { t: "Operadores Lógicos", d: "and, or, not.", c: "if x > 0 and x < 10:" },
                { t: "Listas (List)", d: "Coleções ordenadas.", c: "lista = [1, 2, 3]" },
                { t: "Métodos de Lista", d: "append, pop, insert.", c: "lista.append(4)" },
                { t: "Dicionários", d: "Estrutura chave-valor.", c: "user = {'id': 1}" },
                { t: "Tuplas", d: "Coleções imutáveis.", c: "tupla = (10, 20)" },
                { t: "Sets", d: "Coleções sem duplicatas.", c: "s = {1, 2, 2}" },
                { t: "Loop FOR", d: "Iteração definida.", c: "for i in range(5): print(i)" },
                { t: "Loop WHILE", d: "Iteração condicional.", c: "while x < 5: x += 1" },
                { t: "Break e Continue", d: "Controlando loops.", c: "if x == 3: break" }
            ]},
            { mod: "Módulo 3: Funções", aulas: [
                { t: "Definição de Funções", d: "Reutilização de código.", c: "def somar(): pass" },
                { t: "Parâmetros", d: "Dados de entrada.", c: "def soma(a, b): return a + b" },
                { t: "Retorno", d: "Saída de dados.", c: "return resultado" },
                { t: "Escopo", d: "Variáveis globais vs locais.", c: "global x" },
                { t: "Módulos Padrão", d: "Importando math, random.", c: "import random" },
                { t: "Criando Módulos", d: "Organizando arquivos .py.", c: "from meu_mod import func" },
                { t: "Pacotes", d: "Pastas com __init__.py.", c: "import pacote.modulo" },
                { t: "Try/Except", d: "Tratando erros.", c: "try: ... except: ..." },
                { t: "Exceptions Custom", d: "Erros personalizados.", c: "raise ValueError" },
                { t: "Docstrings", d: "Documentando código.", c: "''' Documentação '''" }
            ]},
            { mod: "Módulo 4: POO", aulas: [
                { t: "O que é POO?", d: "Paradigma orientado a objetos.", c: "class Carro: pass" },
                { t: "Classes e Objetos", d: "Moldes e instâncias.", c: "c = Carro()" },
                { t: "Construtor (__init__)", d: "Inicializando atributos.", c: "def __init__(self):" },
                { t: "Atributos", d: "Características do objeto.", c: "self.cor = 'azul'" },
                { t: "Métodos", d: "Comportamentos.", c: "def ligar(self):" },
                { t: "Encapsulamento", d: "Proteção de dados (_).", c: "self._protegido = 10" },
                { t: "Herança", d: "Reutilização de classes.", c: "class Moto(Carro):" },
                { t: "Polimorfismo", d: "Sobrescrita de métodos.", c: "def som(self):" },
                { t: "Decorators", d: "Modificando funções.", c: "@property" },
                { t: "Abstração", d: "Classes abstratas.", c: "from abc import ABC" }
            ]},
            { mod: "Módulo 5: Profissional", aulas: [
                { t: "Arquivos (TXT)", d: "Leitura e escrita.", c: "with open('a.txt', 'w')" },
                { t: "CSV", d: "Manipulação de planilhas.", c: "import csv" },
                { t: "Venv", d: "Ambientes virtuais.", c: "python -m venv venv" },
                { t: "Pip", d: "Instalação de pacotes.", c: "pip install requests" },
                { t: "Git Básico", d: "Controle de versão.", c: "git commit -m 'aula'" },
                { t: "Debug", d: "Encontrando erros.", c: "breakpoint()" },
                { t: "Requests", d: "Consumo de API.", c: "requests.get(url)" },
                { t: "JSON", d: "Troca de dados.", c: "json.loads(data)" },
                { t: "Flask Intro", d: "Web com Python.", c: "@app.route('/')" },
                { t: "Projeto Final", d: "Sistema completo.", c: "if __name__ == '__main__':" }
            ]}
        ];

        const container = document.getElementById('trilha');
        
        conteudos.forEach(m => {
            let modHTML = `<div class="module"><h2>${m.mod}</h2>`;
            m.aulas.forEach(a => {
                modHTML += `
                    <div class="lesson">
                        <div class="checkbox-container">
                            <input type="checkbox"> <strong>${a.t}</strong>
                        </div>
                        <details>
                            <summary>Ver conteúdo</summary>
                            <p>${a.d}</p>
                            <pre><code>${a.c}</code></pre>
                        </details>
                    </div>`;
            });
            modHTML += `</div>`;
            container.innerHTML += modHTML;
        });
    </script>
</body>
</html>
