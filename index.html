<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso Fullstack: 50 Aulas</title>
    <style>
        :root { --border: #d0d7de; --bg: #f6f8fa; --text: #24292f; --accent: #0969da; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .lesson-card { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 8px; padding: 12px; background: white; display: flex; align-items: center; }
        .lesson-card input { margin-right: 15px; transform: scale(1.2); }
        .lesson-title { font-weight: 600; cursor: pointer; flex-grow: 1; }
        .lesson-content { display: none; padding: 15px; border-top: 1px solid var(--border); background: var(--bg); font-size: 14px; }
        pre { background: #282c34; color: #abb2bf; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .open { display: block; }
    </style>
</head>
<body>

    <h1>🚀 Trilha: 50 Aulas (Python + Web)</h1>
    <p>Marque as aulas conforme for concluindo. Seu progresso é salvo automaticamente!</p>
    
    <div id="lesson-container"></div>

    <script>
        // Lista das aulas
        const aulas = [
            "O que é HTML?", "Setup VS Code", "Estrutura Boilerplate", "Headings (h1-h6)", "Parágrafos", 
            "Formatação de Texto", "Links e Âncoras", "Imagens e Alt", "Listas UL/OL", "Tabelas Básicas", 
            "Divs e Spans", "ID vs Class", "Formulários", "Inputs e Labels", "Botões de Submissão",
            "Intro CSS", "Cores e Backgrounds", "Box Model", "Margem e Padding", "Bordas", 
            "Google Fonts", "Flexbox Row", "Flexbox Col", "Responsividade", "Hover Effects",
            "Setup Python", "Variáveis", "Inteiros e Floats", "Strings", "Listas", 
            "Dicionários", "Input", "Operadores Lógicos", "IF e ELSE", "Loop FOR", 
            "Loop WHILE", "Funções def", "Parâmetros", "Retorno de Dados", "Importando Módulos",
            "Tratamento de Erros", "Classes e Objetos", "Métodos", "Decorators", "Ambientes Virtuais", 
            "Pip e Instalação", "Flask: App Básico", "Flask: Rotas", "Flask: Templates", "Projeto Final"
        ];

        const container = document.getElementById('lesson-container');

        aulas.forEach((titulo, i) => {
            const id = `aula-${i}`;
            const isChecked = localStorage.getItem(id) === 'true';

            const div = document.createElement('div');
            div.innerHTML = `
                <div class="lesson-card">
                    <input type="checkbox" id="check-${i}" ${isChecked ? 'checked' : ''} onchange="toggleCheck('${id}')">
                    <span class="lesson-title" onclick="toggleContent('content-${i}')">Aula ${i + 1}: ${titulo}</span>
                </div>
                <div id="content-${i}" class="lesson-content">
                    <p>Conteúdo de estudo para: <strong>${titulo}</strong></p>
                    <pre><code># Exemplo de código da aula ${i + 1}\nprint("Estudando ${titulo}")</code></pre>
                </div>
            `;
            container.appendChild(div);
        });

        // Funções de controle
        function toggleContent(id) {
            document.getElementById(id).classList.toggle('open');
        }

        function toggleCheck(id) {
            const checked = document.getElementById(`check-${id.split('-')[1]}`).checked;
            localStorage.setItem(id, checked);
        }
    </script>
</body>
</html>
